<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✓ Payment Successful!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8f8f6 0%, #f8f4ea 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
        }

        .container {
            text-align: center;
            max-width: 400px;
            padding: 40px 20px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(45deg, #00d4ff, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
            font-style: italic;
            transform: rotate(-5deg);
            display: inline-block;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: checkmark 0.6s ease-in-out;
        }

        @keyframes checkmark {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            color: black;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-left: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin: 0 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fallback-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
        }

        .fallback-button {
            background: black;
            border: none;
            border-radius: 12px;
            padding: 15px 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            width: 100%;
        }

        .fallback-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 153, 204, 0.4);
        }

        .app-store-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .store-link {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .store-link:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateY(-1px);
        }

        .payment-id {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 20px;
            font-family: 'SF Mono', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 6px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            
            .logo {
                font-size: 36px;
            }
            
            .card {
                padding: 25px 20px;
            }

            .app-store-links {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"> </div>
        
        <div class="card">
            <div class="success-icon">✓</div>
            
            <h1 class="title">Payment Successful!</h1>
            <p class="subtitle">
                Your payment has been processed successfully.<br>
                <span id="redirecting">Redirecting to app <div class="spinner"></div></span>
            </p>
            
            <div id="fallbackSection" class="fallback-section">
                <p style="margin-bottom: 15px; opacity: 0.8;">Trouble opening the app?</p>
                <button id="fallbackButton" class="fallback-button">
                    Open Malibu Money App
                </button>
                <div class="app-store-links">
                    <a href="https://apps.apple.com/app/malibu-money" class="store-link" target="_blank">📱 App Store</a>
                    <a href="https://play.google.com/store/apps/details?id=com.malibu.money" class="store-link" target="_blank">🤖 Play Store</a>
                </div>
            </div>
            
            <div id="paymentId" class="payment-id"></div>
        </div>
    </div>

    <script>
        // Get payment ID from URL parameters (matches your edge function parameter name)
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('paymentid'); // This matches your edge function
        
        console.log('Success page loaded with paymentId:', paymentId);
        
        // Display payment ID if available
        if (paymentId) {
            document.getElementById('paymentId').textContent = `Payment ID: ${paymentId}`;
        }
        
        // Create deep link (matches your FlutterFlow app scheme)
        const deepLink = `malibu-money://malibu-money.com/paymentstatus?paymentid=${paymentId}&status=success`;
        
        console.log('Attempting to redirect to:', deepLink);
        
        // Attempt automatic redirect after 2 seconds
        setTimeout(() => {
            try {
                window.location.href = deepLink;
                console.log('Deep link redirect attempted');
                
                // Hide spinner after redirect attempt
                setTimeout(() => {
                    document.getElementById('redirecting').innerHTML = 'Opening app...';
                }, 1000);
                
            } catch (error) {
                console.error('Deep link redirect failed:', error);
                showFallback();
            }
        }, 2000);
        
        // Show fallback options after 5 seconds
        setTimeout(() => {
            showFallback();
        }, 5000);
        
        function showFallback() {
            document.getElementById('fallbackSection').style.display = 'block';
            document.getElementById('redirecting').innerHTML = 'App should have opened automatically';
            
            // Set up manual redirect button
            document.getElementById('fallbackButton').onclick = function() {
                try {
                    window.location.href = deepLink;
                } catch (error) {
                    console.error('Manual deep link failed:', error);
                    alert('Please open the Malibu Money app manually to see your payment confirmation.');
                }
            };
        }
        
        // Detect if user returns to page (app redirect failed)
        let isHidden = false;
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                isHidden = true;
                console.log('Page hidden - app may have opened');
            } else if (isHidden) {
                console.log('User returned to page - showing fallback options');
                showFallback();
            }
        });

        // Also handle page focus events
        window.addEventListener('blur', () => {
            console.log('Page lost focus - app may have opened');
        });
        
        window.addEventListener('focus', () => {
            console.log('Page regained focus - user returned from app or app failed to open');
            setTimeout(showFallback, 1000);
        });
    </script>
</body>
</html>
